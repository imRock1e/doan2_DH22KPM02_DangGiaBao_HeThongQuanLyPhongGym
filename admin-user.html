<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="public/styles/style.css" />
  </head>

  <body>
    <div class="admin">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <h2>ADMIN</h2>

        <nav>
          <a href="#">Dashboard</a>
          <a href="#">Customers</a>
          <a href="#">Bills</a>
          <a href="#">Settings</a>
        </nav>
      </aside>

      <!-- CONTENT -->
      <main class="content">
        <!-- HEADER -->
        <div class="header">
          <div class="page-title">
            <h1>Customers</h1>
          </div>

          <div class="header-right">
            <div class="user-menu" onclick="goProfile()">
              <img src="https://i.pravatar.cc/40" class="avatar" />
              <span class="username">Gia Bao</span>
            </div>

            <button class="logout-btn" onclick="logout()">Logout</button>
          </div>
        </div>

        <!-- FILTER -->
        <div class="filter-bar">
          <input type="text" placeholder="Search name or phone" />

          <input type="date" />

          <select>
            <option>Status</option>
            <option>Active</option>
            <option>Expired</option>
          </select>

          <button>Add Customer</button>
        </div>

        <!-- TABLE -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Start</th>
                <th>End</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody>
              <!-- DEMO DATA -->
              <script>
                for (let i = 1; i <= 50; i++) {
                  document.write(`
              <tr>
                <td>${i}</td>
                <td>Customer ${i}</td>
                <td>09000000${i}</td>
                <td>Active</td>
                <td>01-03-2026</td>
                <td>01-04-2026</td>
                <td>
                  <button>Edit</button>
                  <button>Delete</button>
                </td>
              </tr>
              `);
                }
              </script>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
